name: rcda_instructor_app
description: "RC Driving Academy — Instructor App (static prototype)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/students/
    - assets/images/instructor/
    - assets/images/RCDA_logo.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/RCDA_applogo.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/RCDA_applogo.jpg"