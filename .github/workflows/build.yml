name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.7'
          channel: 'stable'